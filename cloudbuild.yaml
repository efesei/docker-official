# cloudbuild.yaml
steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$REPO_NAME'
      - '--image=gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--port=${_PORT}'
      - '--allow-unauthenticated'
      - '--use-http2'  # Enable HTTP/2 for better performance
      - '--cpu=1'      # Ensure adequate CPU allocation
      - '--memory=512Mi' # Ensure adequate memory allocation
      - '--concurrency=80' # Allow higher concurrency for multiple connections

# Store images in Google Container Registry
images:
  - 'gcr.io/$PROJECT_ID/$REPO_NAME:$COMMIT_SHA'
  
# Set a timeout for the build
timeout: '1200s'

# Define substitution variables
substitutions:
  _PORT: '0'  # Value of 0 indicates listening on all ports

# Logging configuration
options:
  logging: CLOUD_LOGGING_ONLY
